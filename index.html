    <title>Porodični asistent</title>
    <script>
      // Apply the persisted theme synchronously, before React mounts, so
      // the initial paint isn't a brief flash of the wrong theme (FOUC).
      // Mirrors the logic in src/hooks/useTheme.tsx.
      //
      // Also flips the active <meta name="theme-color"> for the iOS status
      // bar so it matches the chosen theme even when the OS preference
      // disagrees (e.g. user picked light app on a dark-mode phone).
      (function () {
        try {
          var stored = localStorage.getItem("theme-mode");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = stored === "dark" || ((!stored || stored === "auto") && prefersDark);
          if (isDark) document.documentElement.classList.add("dark");

          // Drop the media-scoped theme-color tags and add a single one
          // matching the resolved theme. iOS only honours the first
          // unconditional theme-color, and dynamically updating it on
          // theme toggle (from useTheme) becomes a one-line setAttribute.
          var head = document.head;
          var tags = head.querySelectorAll('meta[name="theme-color"]');
          for (var i = 0; i < tags.length; i++) head.removeChild(tags[i]);
          var meta = document.createElement("meta");
          meta.setAttribute("name", "theme-color");
          meta.setAttribute("content", isDark ? "#111827" : "#2563eb");
          head.appendChild(meta);
        } catch (_) {}
      })();

      // Visual viewport tracking — only kicks in when the on-screen
      // keyboard is actually open. On iOS Safari `vh` / `dvh` don't
      // shrink with the soft keyboard, but `visualViewport.height`
      // does. When the gap between layout and visual viewport exceeds
      // the threshold we publish `--visual-vh` so CSS (the
      // ResponsiveDialog drawer) can size against the visible area.
      //
      // While no keyboard is open we deliberately leave the variable
      // UNSET so CSS falls back to its regular `vh`/`dvh` units. That
      // avoids a class of bug where a momentarily-off visualViewport
      // reading at page load locks the drawer to a too-small size.
      (function () {
        function syncVisualVH() {
          var vv = window.visualViewport;
          if (!vv) return;
          var gap = window.innerHeight - vv.height;
          if (gap > 100) {
            document.documentElement.style.setProperty("--visual-vh", vv.height + "px");
          } else {
            document.documentElement.style.removeProperty("--visual-vh");
          }
        }
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", syncVisualVH);
          window.visualViewport.addEventListener("scroll", syncVisualVH);
        }
        window.addEventListener("resize", syncVisualVH);
        window.addEventListener("orientationchange", syncVisualVH);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
