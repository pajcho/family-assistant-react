# Minimal config for Supabase CLI (db push, link).
# See https://supabase.com/docs/guides/cli/config
project_id = "family-assistant"

[db]
major_version = 17

[db.migrations]
enabled = true

# Email changes apply immediately without a confirmation link, matching
# the prod project's "Secure email change" = off setting. We don't have
# a real email provider wired up, so requiring confirmation would just
# trap the change in Mailpit (local) or hit Supabase's deliverability-
# poor default sender (prod). For a closed family app the trade-off is
# fine — the only risk is "user typos their own email", which the user
# can fix by editing again or asking the other family member.
[auth.email]
double_confirm_changes = false

# subscribe-push is called from the client with a user JWT — keep the
# default verify_jwt = true so RLS protects the upsert.
#
# send-due-pushes is called from pg_cron, not from a user session, so
# there's no client JWT to verify. We turn verify_jwt off and instead
# require a shared CRON_SECRET in the X-Cron-Secret header (both the
# function and the cron job read it from Supabase secrets / Postgres
# settings). Anything without the matching secret is rejected before
# touching the DB.
[functions.send-due-pushes]
verify_jwt = false
