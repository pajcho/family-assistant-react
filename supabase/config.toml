# Minimal config for Supabase CLI (db push, link).
# See https://supabase.com/docs/guides/cli/config
project_id = "family-assistant"

[db]
major_version = 17

[db.migrations]
enabled = true


# subscribe-push is called from the client with a user JWT — keep the
# default verify_jwt = true so RLS protects the upsert.
#
# send-due-pushes is called from pg_cron, not from a user session, so
# there's no client JWT to verify. We turn verify_jwt off and instead
# require a shared CRON_SECRET in the X-Cron-Secret header (both the
# function and the cron job read it from Supabase secrets / Postgres
# settings). Anything without the matching secret is rejected before
# touching the DB.
[functions.send-due-pushes]
verify_jwt = false

# notify-on-create is invoked by AFTER INSERT triggers via pg_net, not by
# a user session. Same X-Cron-Secret pattern as send-due-pushes.
[functions.notify-on-create]
verify_jwt = false

# gcal-oauth-callback is hit by Google's OAuth redirect — a top-level browser
# navigation with no Supabase session, so there's no JWT to verify. Security
# comes from the HMAC-signed `state` that gcal-oauth-start issued. The other
# gcal functions (gcal-oauth-start, gcal-disconnect, gcal-calendars) are called
# from the client with the user's session and keep the default verify_jwt = true.
[functions.gcal-oauth-callback]
verify_jwt = false

# gcal-sync is fired by pg_cron, not a user session — same X-Cron-Secret pattern
# as send-due-pushes.
[functions.gcal-sync]
verify_jwt = false
